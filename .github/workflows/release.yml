name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-test:
    name: Build & Test
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy --release -- -D warnings

      - name: Build Release
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Run Tests
        run: cargo test

      - name: CLI Smoke Test
        run: |
          ./target/x86_64-unknown-linux-gnu/release/ghostfetch --version
          ./target/x86_64-unknown-linux-gnu/release/ghostfetch --help > /dev/null
          ./target/x86_64-unknown-linux-gnu/release/ghostfetch --off > /dev/null
          ./target/x86_64-unknown-linux-gnu/release/ghostfetch --no-color > /dev/null

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ghostfetch-binary
          path: target/x86_64-unknown-linux-gnu/release/ghostfetch
          retention-days: 1

  release:
    name: Create Release
    needs: build-test
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ghostfetch-binary
          path: release/

      - name: Create Release Archive
        run: |
          cd release
          chmod +x ghostfetch
          cp ../README.md ../LICENSE . 2>/dev/null || true
          tar -czvf ghostfetch-linux-x86_64.tar.gz ghostfetch README.md LICENSE 2>/dev/null || tar -czvf ghostfetch-linux-x86_64.tar.gz ghostfetch
          sha256sum ghostfetch-linux-x86_64.tar.gz > ghostfetch-linux-x86_64.tar.gz.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/ghostfetch-linux-x86_64.tar.gz
            release/ghostfetch-linux-x86_64.tar.gz.sha256
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
