name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Build Release
        run: |
          cargo build --release --target x86_64-unknown-linux-gnu

      - name: Run Tests
        run: cargo test

      - name: Create Release Archive
        run: |
          mkdir -p release
          cp target/x86_64-unknown-linux-gnu/release/ghostfetch release/
          cp README.md LICENSE release/ 2>/dev/null || true
          cd release
          tar -czvf ghostfetch-linux-x86_64.tar.gz ghostfetch README.md LICENSE 2>/dev/null || tar -czvf ghostfetch-linux-x86_64.tar.gz ghostfetch
          sha256sum ghostfetch-linux-x86_64.tar.gz > ghostfetch-linux-x86_64.tar.gz.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/ghostfetch-linux-x86_64.tar.gz
            release/ghostfetch-linux-x86_64.tar.gz.sha256
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
